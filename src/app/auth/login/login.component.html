<p-panel class="PanelLogin" header="سامانه بانکداری شرکتی/سازمانی  دیجیتال">
    <div id="panelDiv1" class="p-d-flex p-flex-column p-ai-end app-gap-1r app-px-6r app-py-2r">
        <div class="p-d-flex p-jc-center p-ai-center app-gap-2r">
            <label for="username">شناسه کاربری:</label>
            <input id="username" dir="ltr" pInputText [(ngModel)]="userName" (keyup.enter)="login()" [disabled]="loading">
        </div>
        <div class="p-d-flex p-jc-center p-ai-center app-gap-2r">
            <label for="pass">رمز عبور:</label>
            <input id="pass" type="password" dir="ltr" pInputText [(ngModel)]="password" (keyup.enter)="login()"
                [disabled]="loading">
        </div>
        <div class="p-d-flex p-jc-center p-ai-center app-gap-2r">
            <label for="loginType">نوع ورود:</label>
            <p-dropdown id="loginType" class="loginType" [autoDisplayFirst]="true" [options]="droplist" (keyup.enter)="login()"
                [disabled]="loading"></p-dropdown>
        </div>
        <div class="p-d-flex p-jc-center p-ai-center p-as-center app-gap-2r" id="btnDiv">
            <a href="#">فراموشی رمز عبور</a>
            <button id="btnLog" pButton class="p-px-6 p-py-3" [loading]="loading" iconPos="right" label="ورود"
                (click)="login()"></button>
        </div>
    </div>
</p-panel>
