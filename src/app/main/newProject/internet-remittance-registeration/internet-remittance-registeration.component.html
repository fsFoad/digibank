<p-panel header="ثبت حواله اینترنتی">
  <div class="app-mx-20r">
    <div class="p-fluid p-formgrid p-grid app-col-px-2r">
      <div class="p-field p-col">
        <span>جمع مبلغ حواله‌های روز جاری:</span>
        <span style="margin-inline-start: 1em;">362,250,000 ریال</span>
      </div>
    </div>
    <div class="p-fluid p-formgrid p-grid app-col-px-2r">
      <div class="p-field p-col-4">
        <p-dropdown [required]="true" placeholder="انتقال از" [options]="acItems" [editable]="true"></p-dropdown>
      </div>

      <div class="p-field p-col-4">
        <input *ngIf="!organizationalAccount" required pInputText placeholder="انتقال به">
        <p-dropdown *ngIf="organizationalAccount" [required]="true" placeholder="انتقال به" [options]="acItems"
                    [editable]="true"></p-dropdown>
      </div>
      <div class="p-field p-col-4 p-d-flex p-ai-center">
        <p-checkbox name="organizationalAccounts" [binary]="true" [(ngModel)]="organizationalAccount"
                    label="حساب‌های شرکت/سازمان"></p-checkbox>
      </div>
    </div>
    <div class="p-fluid p-formgrid p-grid app-col-px-2r">
      <div class="p-field p-col-4">
        <p-inputNumber [required]="true" mode="decimal" [useGrouping]="true" suffix=" ریال"
                       [minFractionDigits]="0" placeholder="مبلغ حواله"></p-inputNumber>
      </div>
      <div class="p-field p-col-4">
        <input pInputText placeholder="شناسه واریز کننده">
      </div>

    </div>
    <div class="p-fluid p-formgrid p-grid app-col-px-2r">
      <div class="p-field p-col-8">
        <input pInputText placeholder="بابت">
      </div>
    </div>
    <div class="p-d-flex p-jc-center app-child-px-4r">
      <button pButton label="تائید" (click)="confirmDlg.visible = true" class="p-mr-2 p-mb-2"></button>
      <button id="btnBack" class="p-button-info" pButton label="انصراف" class="p-mr-2 p-mb-2" (click)="onClose()"></button>
    </div>
  </div>
</p-panel>

<p-confirmDialog #confirmDlg header="توجه" acceptLabel="تایید" message="عملیات با موفقیت انجام شد"
                 [rejectVisible]="false" [closable]="false" icon="pi pi-info-circle">
</p-confirmDialog>
