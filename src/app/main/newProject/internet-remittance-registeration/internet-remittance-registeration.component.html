<p-panel>
  <ng-template pTemplate="header">
    <div class="bf-panel-header">
      <span class="bf-panel-title">ثبت حواله</span>
      <button pButton icon="pi pi-arrow-right" title="بازگشت" class="p-button-rounded p-button-text bf-back-btn"
              (click)="goHome()"></button>
    </div>
  </ng-template>
  <div class="app-mx-20r">
    <div class="p-fluid p-formgrid p-grid app-col-px-2r">
      <div class="p-field p-col">
        <span>جمع مبلغ حواله‌های روز جاری:</span>
        <span style="margin-inline-start: 1em;">362,250,000,000</span>
      </div>
    </div>
    <div class="p-fluid p-formgrid p-grid app-col-px-2r">
      <div class="p-field p-col-4">
        <span class="p-float-label">
          <p-dropdown [autoDisplayFirst]="false" [options]="bankNameList" [(ngModel)]="selectedBank"
                      (onChange)="onBankChange()"></p-dropdown>
          <label>نام بانک</label>
        </span>
      </div>
    </div>
    <div class="p-fluid p-formgrid p-grid app-col-px-2r">
      <div class="p-field p-col-4">
        <span class="p-float-label">
        <p-dropdown [autoDisplayFirst]="false" [required]="true"  [options]="acItems"
                    [editable]="true" [disabled]="!selectedBank"></p-dropdown>
          <label>انتقال از</label>
        </span>
      </div>

      <div class="p-field p-col-4">
        <span class="p-float-label">
        <input *ngIf="!organizationalAccount" required pInputText placeholder="">
        <p-dropdown *ngIf="organizationalAccount" [required]="true"  [options]="acItems"
                    [editable]="true"></p-dropdown>
        <label>انتقال به</label>
        </span>
      </div>
      <div class="p-field p-col-4 p-d-flex p-ai-center">
        <p-checkbox name="organizationalAccounts" [binary]="true" [(ngModel)]="organizationalAccount"
                    label="حساب‌های شرکت/سازمان"></p-checkbox>
      </div>
    </div>
    <div class="p-fluid p-formgrid p-grid app-col-px-2r">
      <div class="p-field p-col-4">
        <span class="p-float-label">
        <p-inputNumber [required]="true" mode="decimal" [useGrouping]="true" suffix=" ریال"
                       [minFractionDigits]="0"></p-inputNumber>
          <label>مبلغ حواله</label>
        </span>
      </div>
      <div class="p-field p-col-4">
        <span class="p-float-label">
        <input pInputText placeholder="">
           <label>شناسه واریز کننده</label>
        </span>
      </div>
    </div>
    <div class="p-fluid p-formgrid p-grid app-col-px-2r">
      <div class="p-field p-col-8">
        <span class="p-float-label">
          <input pInputText >
          <label>بابت</label>
        </span>
      </div>
    </div>
    <div class="p-d-flex p-jc-center app-child-px-4r">
      <button pButton label="تائید" (click)="confirmDlg.visible = true" class="p-mr-2 p-mb-2"></button>
      <button id="btnBack" class="p-button-info" pButton label="انصراف" class="p-mr-2 p-mb-2"
              (click)="onClose()"></button>
    </div>
  </div>
</p-panel>

<p-confirmDialog #confirmDlg header="توجه" acceptLabel="تایید" message="عملیات با موفقیت انجام شد"
                 [rejectVisible]="false" [closable]="false" icon="pi pi-info-circle">
</p-confirmDialog>
