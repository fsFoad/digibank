<p-panel>
  <ng-template pTemplate="header">
    <div class="bf-panel-header">
      <span class="bf-panel-title">گزارش منابع سپرده</span>
      <button pButton icon="pi pi-arrow-right" title="بازگشت" class="p-button-rounded p-button-text bf-back-btn"
              (click)="goHome()"></button>
    </div>
  </ng-template>
  <div class="p-d-flex p-jc-center">
    <p-chart type="pie" [data]="data" [options]="chartOptions"></p-chart>
  </div>
</p-panel>
