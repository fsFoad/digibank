<p-panel header="ثبت حواله ساتنا (مالی)" [ngStyle]="{'width':'100%'}">
  <div class="p-d-flex p-flex-wrap Fs-mlf">
    <div class=" p-md-5 ">
      <span class="p-float-label">
        <input dir="ltr" [(ngModel)]="ibon" pInputText>
        <label>شماره شبا</label>
      </span>
    </div>
    <div class="FS-mr2 p-md-2 ">
      <span class="p-float-label">
        <input dir="rtl" disabled pInputText>
        <label>صاحب حساب</label>
      </span>
    </div>
    <div class="FS-mr2 p-md-2 ">
      <span class="p-float-label">
        <input dir="rtl" disabled pInputText>
        <label>متعلق به حساب</label>
      </span>
    </div>
    <div class="FS-mr2 p-md-2 ">
      <span class="p-float-label">
        <p-inputNumber [required]="true" mode="decimal" [useGrouping]="true" suffix=" ریال" [minFractionDigits]="0"
                        ></p-inputNumber>
        <label>مبلغ</label>
      </span>
    </div>
    <br>
  </div>
  <br>
  <p-card header="اشخاص حقیقی">
    <div class="p-d-flex p-flex-wrap Fs-mlf3">
      <div class="p-md-3">
        <span class="p-float-label">
          <input pInputText>
          <label>نام</label>
        </span>
      </div>
      <div class="p-md-3">
        <span class="p-float-label">
          <input pInputText>
          <label>نام خانوادگی</label>
        </span>
      </div>
      <div class="p-md-3">
        <span class="p-float-label">
          <input pInputText>
          <label>کد ملی</label>
        </span>
      </div>
      <div class="p-md-3">
        <span class="p-float-label">
          <input pInputText>
          <label>شناسنامه</label>
        </span>
      </div>
      <div class="p-md-3">
        <span class="p-float-label">
          <input pInputText>
          <label>نام پدر</label>
        </span>
      </div>
      <div class="p-md-3">
        <span class="p-float-label">
          <input pInputText>
          <label>کد شهاب</label>
        </span>
      </div>
      <div class="p-md-3">
        <span class="p-float-label">
          <input pInputText>
          <label>کد پستی</label>
        </span>
      </div>
      <div class="p-md-3">
        <span class="p-float-label">
          <input pInputText>
          <label>شماره تماس</label>
        </span>
      </div>
    </div>
  </p-card>

  <br>
  <p-card header="اشخاص حقوقی">
    <div class="p-d-flex p-flex-wrap Fs-mlf4">
      <div class="Fs-p-md2 ">
        <span class="p-float-label">
          <input pInputText>
          <label>کد شهاب مبدا</label>
        </span>
      </div>
      <div class="Fs-p-md2 FS-mr3">
        <span class="p-float-label">
          <input pInputText>
          <label>اطلاعات پیوست مشتریان</label>
        </span>
      </div>
      <div class="Fs-p-md2  FS-mr3">
        <span class="p-float-label">
          <p-dropdown [autoDisplayFirst]="false" class="p-dropdown-w80" optionValue="value" optionLabel="label">
          </p-dropdown>
          <label> در خواست پرداخت</label>
        </span>
      </div>
      <br>
      <div class="FS-mr1 Fs-p-md-11-5 ">
        <span class="p-float-label">
          <br>
          <input pInputText/>
          <label>شرح / توضیحات</label>
        </span>
      </div>
    </div>
  </p-card>

  <div class="p-col-12">
    <br>
    <button id="btnRegister" class="p-button-info" pButton label="ثبت در خواست"></button>&nbsp;
    <button id="btnCheckNationalCode" class="p-button-info" pButton label="برسی صحت کد ملی"></button>&nbsp;
  </div>
</p-panel>
