<p-panel header="مشاهده و ویرایش اطلاعات">
  <div class="app-mx-5r">
    <div class="p-fluid p-formgrid p-grid app-mx-10r">
      <div class="p-field p-col">
        <span class="p-float-label">
          <input class="input-w-100" pInputText>
          <label>شناسه عددی</label>
        </span>
      </div>
      <div class="p-field p-col">
        <span class="p-float-label">
          <input class="input-w-100" pInputText>
          <label>شماره حواله</label>
        </span>
      </div>
      <div class="p-field p-col">
        <span class="p-float-label">
          <input class="input-w-100" pInputText>
          <label>شماره سهامدار</label>
        </span>
      </div>
    </div>
    <div class="p-fluid p-formgrid p-grid app-mx-10r">
      <div class="p-field p-col">
        <span class="p-float-label">
          <p-dropdown class="p-dropdown-w100" optionValue="value"
                      optionLabel="label"></p-dropdown>
          <label>مشتری ویژه</label>
        </span>
      </div>
      <div class="p-field p-col">
        <span class="p-float-label">
          <input class="input-w-100" pInputText>
          <label>کد دوره پرداخت</label>
        </span>
      </div>
      <div class="p-field p-col">
        <span class="p-float-label">
          <input class="input-w-100" pInputText>
          <label>شناسه حرفی</label>
        </span>
      </div>
    </div>
    <div class="p-d-flex p-jc-center">
      <button pButton class="p-button-info btnWidth btn-ml " label="جستجو"></button>
      <button pButton class="p-button-info btnWidth" label="پاک کردن فرم"></button>
    </div>
  </div>
</p-panel>
