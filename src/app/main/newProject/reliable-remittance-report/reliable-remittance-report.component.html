<p-panel header="گزارش حواله پایا">
  <div class="app-mx-5r">
    <div class="p-fluid p-formgrid p-grid app-mx-30r">
      <div class="p-field p-col">
        <span class="p-float-label">
          <p-dropdown [autoDisplayFirst]="false" [options]="reportTypeList"></p-dropdown>
          <label>نوع گزارش</label>
        </span>
      </div>
      <div class="p-field p-col">
        <span class="p-float-label">
          <p-dropdown [autoDisplayFirst]="false" [options]="bankNameList"></p-dropdown>
          <label>نام بانک</label>
        </span>
      </div>
    </div>
    <div class="p-fluid p-formgrid p-grid app-mx-30r">
      <div class="p-field p-col">
        <span class="p-float-label">
          <p-persian-calendar yearRange="1300:1410" class="app-persian-calendar-style"
          ></p-persian-calendar>
          <label>از تاریخ</label>
      </span>
      </div>
      <div class="p-field p-col">
        <span class="p-float-label">
          <p-persian-calendar yearRange="1300:1410" class="app-persian-calendar-style">
          </p-persian-calendar>
          <label>تا تاریخ</label>
        </span>
      </div>
    </div>
    <div class="p-grid p-formgrid p-fluid app-mx-54r">
      <div class="p-col-12 p-lg-4">
        <button pButton pRipple type="button" label="تایید" style="width:10rem" class="p-mr-2 p-mb-2"></button>
      </div>
    </div>
  </div>
</p-panel>
