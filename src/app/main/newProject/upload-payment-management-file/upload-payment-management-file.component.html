<p-panel header="بارگذاری فایل">
  <div class="app-mx-5r">
    <div class="p-fluid p-formgrid p-grid row1">
      <div class="p-field p-col">
        <p-dropdown class="p-dropdown-w100" placeholder="مشتری ویژه" optionValue="value"
                    [autoDisplayFirst]="false"    optionLabel="label"></p-dropdown>
      </div>
      <div class="p-field p-col">
        <input class="input-w-100" placeholder="شماره حساب" pInputText >
      </div>
    </div>
    <div class="p-fluid p-formgrid p-grid app-mx-10r">
      <div class="p-field p-col">
        <input class="input-w-100" placeholder="نوع پرداخت" pInputText >
      </div>
      <div class="p-field p-col">
        <input class="input-w-100" placeholder="سقف پرداخت" pInputText >
      </div>
      <div class="p-field p-col">
        <input class="input-w-100" placeholder="شرح" pInputText >
      </div>
    </div>
    <div class="p-fluid p-formgrid p-grid app-mx-10r">
      <div class="p-field p-col">
        <p-fileUpload mode="basic" [auto]="true" [customUpload]="true"
                      [showCancelButton]="false" [showUploadButton]="false" [multiple]="false"
                      accept=".xlsx" chooseLabel="بارگذاری فایل"  >
          <ng-template pTemplate="content">
          </ng-template>
        </p-fileUpload>
      </div>
    </div>
    <div class="p-grid p-formgrid p-fluid app-mx-50r">
      <div class="p-col-12 p-lg-4">
        <button pButton pRipple type="button" label="بارگذاری" style="width:10rem" class="p-mr-2 p-mb-2"></button>
      </div>
    </div>
  </div>
</p-panel>
