<p-panel header="کارتابل">
  <div class="app-mx-5r">
    <div class="p-fluid p-formgrid p-grid app-col-px-2r p-mt-1">
      <div class="p-field p-col">
        <span class="p-float-label">
        <input class="input-w-100" pInputText>
          <label>شماره در خواست</label>
      </span>
      </div>
      <div class="p-field p-col">
        <span class="p-float-label">
          <p-persian-calendar yearRange="1300:1410" class="app-persian-calendar-style">
          </p-persian-calendar>
          <label>از تاریخ</label>
      </span>
      </div>
      <div class="p-field p-col">
        <span class="p-float-label">
          <p-persian-calendar yearRange="1300:1410" yearRange="1300:1410"
                              class="app-persian-calendar-style"></p-persian-calendar>
          <label>تا تاریخ</label>
      </span>
      </div>
      <div class="p-field p-col">
        <span class="p-float-label">
          <p-dropdown class="p-dropdown-w100" optionValue="value" optionLabel="label"></p-dropdown>
          <label>واحد مربوطه</label>
      </span>
      </div>
    </div>
  </div>
  <div class="p-d-flex p-jc-center p-mt-5 p-mb-5">
    <button id="btnRecovery" class="p-button-info" pButton label="جستجو" (click)="tableFlag=true;"></button>&nbsp;
    <button id="btnSearch" class="p-button-info" pButton label="گزارش" (click)="tableFlag=true;"></button>&nbsp;
    <button id="btncardBoard" class="p-button-info" pButton label="نمایش کارتابل" (click)="tableFlag=true;"></button>&nbsp;
  </div>
  <div *ngIf=tableFlag class="p-mt-4">
    <p-card>
      <p-table [value]="fsList">
        <ng-template pTemplate="header">
          <tr>
            <th translate>ردیف</th>
            <th translate id="thAccountNumber">شماره در خواست</th>
            <th translate>نوع عملیات</th>
            <th translate>مبلغ</th>
            <th translate>وضعیت عملیات</th>
            <th translate>زمان</th>
          </tr>
        </ng-template>
        <ng-template let-i="rowIndex" pTemplate="body" let-service>
          <tr>
            <td>{{i + 1}}</td>
            <td>{{service.applicationNumber}}</td>
            <td>{{service.operationType}}</td>
            <td>{{service.amount|addCommaSeparator}}</td>
            <td>{{service.result}}</td>
            <td>{{service.time|timePipe}}</td>
          </tr>
        </ng-template>
      </p-table>
    </p-card>
  </div>
</p-panel>
