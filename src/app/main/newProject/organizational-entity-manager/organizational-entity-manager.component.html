<p-panel header="ذینفع سازمانی"> 
  <p-tabView class="tab-view  p-shadow-3 section" [(activeIndex)]="activeTab">
    <p-tabPanel header="اطلاعات سازمانی">
      <app-organizational-entity-info-editor></app-organizational-entity-info-editor>
    </p-tabPanel>
    <p-tabPanel header="اطلاعات هیئت مدیره و سهامداران">
      <app-board-of-directors-editor></app-board-of-directors-editor>
    </p-tabPanel>
    <p-tabPanel header="امضاء">
      <app-party-signature-editor></app-party-signature-editor>
    </p-tabPanel>
    <p-tabPanel header="نقش سازمانی">
      <app-organizational-role-editor></app-organizational-role-editor>
    </p-tabPanel>
    <p-tabPanel header="اطلاعات تماس">
      <app-organizational-contact-info-editor></app-organizational-contact-info-editor>
    </p-tabPanel>
    <p-tabPanel header="مستندات">
      <app-organizational-entity-documents-editor></app-organizational-entity-documents-editor>
    </p-tabPanel>
  </p-tabView>
  
  <div class="bottom-buttons  p-shadow-3 section">
    <button pButton label="ادامه" class="p-button-info" (click)="nextTab()" [disabled]="activeTab >= 5"></button>
    <button pButton label="مرحله قبل" class="p-button-info" (click)="prevTab()" [disabled]="activeTab <= 0"></button>
  </div>
</p-panel>
