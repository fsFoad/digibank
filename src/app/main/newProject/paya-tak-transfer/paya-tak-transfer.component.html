<p-panel [ngStyle]="{'width':'100%'}">
  <ng-template pTemplate="header">
    <div class="bf-panel-header">
      <span class="bf-panel-title">ثبت حواله پایا تک مرحله ای</span>
      <button pButton icon="pi pi-arrow-right" title="بازگشت" class="p-button-rounded p-button-text bf-back-btn"
              (click)="goHome()"></button>
    </div>
  </ng-template>
  <div class="app-mx-2-5r">
    <div class="p-fluid p-formgrid p-grid app-col-px-2r p-mt-1">
      <div class="p-field p-col">
        <span class="p-float-label">
          <input dir="ltr" [(ngModel)]="ibon" pInputText>
          <label>شماره شبا</label>
        </span>
      </div>
      <div class="p-field p-col">
        <span class="p-float-label">
          <input dir="rtl" disabled pInputText>
          <label>صاحب حساب</label>
        </span>
      </div>
      <div class="p-field p-col">
        <span class="p-float-label">
          <input dir="rtl" disabled pInputText>
          <label>متعلق به حساب</label>
        </span>
      </div>
      <div class="p-field p-col">
        <span class="p-float-label">
          <p-inputNumber [required]="true" mode="decimal" [useGrouping]="true" suffix=" ریال"
                         [minFractionDigits]="0"></p-inputNumber>
          <label>مبلغ</label>
        </span>
      </div>
    </div>
  </div>
  <p-card header="اشخاص حقیقی">
    <div class="p-fluid p-formgrid p-grid app-mx-5r app-col-px-2r ">
      <div class="p-field p-col">
          <span class="p-float-label">
            <input pInputText>
            <label>نام</label>
          </span>
      </div>
      <div class="p-field p-col">
          <span class="p-float-label">
            <input pInputText>
            <label>نام خانوادگی</label>
          </span>
      </div>
      <div class="p-field p-col">
          <span class="p-float-label">
            <input pInputText>
            <label>کد ملی</label>
          </span>
      </div>
      <div class="p-field p-col">
          <span class="p-float-label">
            <input pInputText>
            <label>شناسنامه</label>
          </span>
      </div>
    </div>
    <div class="p-fluid p-formgrid p-grid app-mx-5r app-col-px-2r p-mt-1">
      <div class="p-field p-col">
          <span class="p-float-label">
            <input pInputText>
            <label>نام پدر</label>
          </span>
      </div>
      <div class="p-field p-col">
          <span class="p-float-label">
            <input pInputText>
            <label>کد شهاب</label>
          </span>
      </div>
      <div class="p-field p-col">
          <span class="p-float-label">
            <input pInputText>
            <label>کد پستی</label>
          </span>
      </div>
      <div class="p-field p-col">
          <span class="p-float-label">
            <input pInputText>
            <label>شماره تماس</label>
          </span>
      </div>
    </div>
  </p-card>
<br>
  <p-card header="اشخاص حقوقی">
    <div class="app-mx-20r p-mt-5">
      <div class="p-fluid p-formgrid p-grid app-col-px-2r p-mt-1">
        <div class="p-field p-col">
        <span class="p-float-label">
          <input pInputText>
          <label>کد شهاب مبدا</label>
        </span>
        </div>
        <div class="p-field p-col">
        <span class="p-float-label">
          <input pInputText>
          <label>اطلاعات پیوست مشتریان</label>
        </span>
        </div>
        <div class="p-field p-col">
        <span class="p-float-label">
          <p-persian-calendar yearRange="1300:1410"
                              class="app-persian-calendar-style"></p-persian-calendar>
          <label>تاریخ موثر</label>
        </span>
        </div>
        <div class="p-field p-col">
        <span class="p-float-label">
          <p-dropdown class="p-dropdown-w100" optionValue="value"
                      [autoDisplayFirst]="false" optionLabel="label"></p-dropdown>
          <label> در خواست پرداخت</label>
        </span>
        </div>
      </div>
    </div>
    <div class="app-mx-20r">
      <div class="p-fluid p-formgrid p-grid app-col-px-2r p-mt-1">
        <div class="p-field p-col">
          <span class="p-float-label">
          <input pInputText/>
          <label>شرح / توضیحات</label>
        </span>
        </div>
      </div>
    </div>
  </p-card>
  <div class="p-d-flex p-jc-center p-mt-5">
    <button id="btnRegister" class="p-button-info" pButton label="ثبت در خواست"></button>&nbsp;
    <button id="btnCheckNationalCode" class="p-button-info" pButton label="برسی صحت کد ملی"></button>
  </div>
</p-panel>
