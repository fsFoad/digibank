<p-card header="ایجاد اطلاعات تماس">
  <div class="app-mx-20r p-jc-center">
    <div class="p-fluid p-formgrid p-grid  ">

      <div class="p-field p-col-4">
        <p-dropdown placeholder="گروه نوع تماس" [options]="contactTypeGroups" [autoDisplayFirst]="false"></p-dropdown>
      </div>
      <div class="p-field p-col-4">
        <p-dropdown placeholder="نوع تماس" [options]="contactTypes" [autoDisplayFirst]="false"></p-dropdown>
      </div>
      <div class="p-field p-col-4">
        <input class="input-w-100" formControlName="mobile" placeholder="شرح تماس" pInputText >
      </div>
    </div>
  </div>
  <div class="p-fluid p-formgrid p-grid app-mx-20r ">
    <div class="p-field p-col-2"></div>
    <div class="p-field p-col-4">
      <p-persian-calendar yearRange="1300:1410" class="app-persian-calendar-style"  placeholder="تاریخ شروع"></p-persian-calendar>
    </div>
    <div class="p-field p-col-4">
      <p-persian-calendar yearRange="1300:1410" class="app-persian-calendar-style"  placeholder="تاریخ پایان"></p-persian-calendar>
    </div>
  </div>
  <div class="p-d-flex app-gap-1r app-child-px-3r p-jc-center p-mt-6">
    <button label="تایید" pButton ></button>
    <button label="انصراف" pButton (click)="onClose()"></button>
  </div>
</p-card>
