<p-panel header="اطلاعات ذینفع سازمانی"  *ngIf="!editing">
  <!-- لیست -->
  <div class="oe-wrap">
    <div class="oe-toolbar">
      <span class="oe-heading">فهرست ذینفعان سازمانی</span>
      <span class="oe-count">{{ entities.length }} مورد</span>
      <button pButton icon="pi pi-plus" label="افزودن" class="p-button-success oe-add-btn"
              (click)="add()"></button>
    </div>

    <p-table #dt [value]="entities" class="oe-table"
             [globalFilterFields]="['customerName','contactNumber','relationshipType']">
     <!-- <ng-template pTemplate="caption">
        <span class="oe-search p-input-icon-right">
          <i class="pi pi-search"></i>
          <input pInputText type="text" placeholder="جستجو…"
                 (input)="dt.filterGlobal($any($event.target).value, 'contains')">
        </span>
      </ng-template>-->
      <ng-template pTemplate="header">
        <tr>
          <th class="oe-th-index">ردیف </th>
          <th>نام ذینفع</th>
          <th>تاریخ تعریف</th>
          <th>شماره تماس</th>
          <th>نوع ذینفع</th>
          <th>نوع رابطه</th>
          <th class="oe-th-actions">عملیات</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-row let-i="rowIndex">
        <tr>




          <td class="oe-index">{{ i + 1 }}</td>
          <td class="oe-name">{{ row.customerName }}</td>
          <td>{{row.registrationDate|castToDate}}</td>
          <td class="oe-mono">{{ row.contactNumber }}</td>
          <td><span class="oe-badge">{{row.customerType}}</span></td>
          <td>{{ row.relationshipType }}</td>
          <td>
            <div class="oe-actions">
              <button pButton icon="pi pi-eye" title="نمایش"
                      class="oe-btn p-button-rounded  p-button-outlined" (click)="view(row)"></button>
              <button pButton icon="pi pi-pencil" title="ویرایش"
                      class="oe-btn p-button-rounded  p-button-outlined" (click)="edit(row)"></button>
              <button pButton icon="pi pi-trash" title="حذف"
                      class="oe-btn  p-button-rounded  p-button-outlined" (click)="remove(row)"></button>
            </div>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="7">
            <div class="oe-empty"><i class="pi pi-inbox"></i><span>ذینفعی برای نمایش وجود ندارد</span></div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>

  <!-- ویرایشِ inline -->

</p-panel>
<app-organizational-entity-add *ngIf="editing" [mode]="mode" [entity]="selected"
                                (done)="onDone()"></app-organizational-entity-add>
<p-confirmDialog [closable]="false"></p-confirmDialog>
