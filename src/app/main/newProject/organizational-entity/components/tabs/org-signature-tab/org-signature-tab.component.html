<div class="app-mx-5r" [formGroup]="form">
  <div class="p-fluid p-formgrid p-grid app-col-px-2r">
    <div class="p-col-6">
      <div class="p-fluid p-formgrid p-grid app-col-px-2r">
        <div class="p-field p-col-6">
          <span class="p-float-label">
            <p-dropdown [autoDisplayFirst]="false" [options]="signType" formControlName="signType"></p-dropdown>
            <label>نوع امضا</label>
          </span>
        </div>
      </div>

      <div class="p-fluid p-formgrid p-grid app-col-px-2r">
        <div class="p-field p-col">
          <span class="p-float-label">
            <p-persian-calendar formControlName="startDate" yearRange="1300:1410" class="app-persian-calendar-style"></p-persian-calendar>
            <label>تاریخ شروع</label>
          </span>
        </div>
        <div class="p-field p-col">
          <span class="p-float-label">
            <p-persian-calendar formControlName="endDate" yearRange="1300:1410" class="app-persian-calendar-style"></p-persian-calendar>
            <label>تاریخ پایان</label>
          </span>
        </div>
      </div>

      <div class="p-fluid p-formgrid p-grid app-col-px-2r">
        <div class="p-field p-col">
          <span class="p-float-label"><input formControlName="description" pInputText><label>توضیحات</label></span>
        </div>
      </div>
    </div>

    <div class="p-col-6">
      <div class="p-fluid p-formgrid p-grid app-col-px-2r p-jc-center">
        <div class="p-col" style="background: #eceef1; border: 1px solid #d4d8de; border-radius: 8px; max-width: 300px; height: 300px;"></div>
      </div>
    </div>
  </div>
</div>
