<p-panel header="ثبت حواله پایا منظم" [ngStyle]="{'width':'100%'}">
    <div class="p-d-flex p-flex-wrap Fs-mlf">
        <div class=" p-md-5 ">
            <input placeholder="شماره شبا" dir="ltr" [(ngModel)]="ibon" pInputText>
        </div>
        <div class="FS-mr2 p-md-2 ">
            <input placeholder="صاحب بانک" dir="rtl" disabled pInputText>
        </div>
        <div class="FS-mr2 p-md-2 ">
            <input placeholder="متعلق به حساب" dir="rtl" disabled pInputText>
        </div>
        <div class="FS-mr2 p-md-2 ">
          <p-inputNumber [required]="true" mode="decimal" [useGrouping]="true" suffix=" ریال" [minFractionDigits]="0" placeholder="مبلغ"></p-inputNumber>

        </div>
    </div>
    <br>
    <p-card header="اشخاص حقیقی">
        <div class="p-d-flex p-flex-wrap Fs-mlf3">
            <div class="p-md-3">
                <input placeholder="نام" pInputText>
            </div>
            <div class="p-md-3">
                <input placeholder="نام خانوادگی" pInputText>
            </div>
            <div class="p-md-3">
                <input placeholder="کد ملی" pInputText>
            </div>
            <div class="p-md-3">
                <input placeholder="شناسنامه" pInputText>
            </div>
            <div class="p-md-3">
                <input placeholder="نام پدر" pInputText>
            </div>
            <div class="p-md-3">
                <input placeholder="کد شهاب" pInputText>
            </div>
            <div class="p-md-3">
                <input placeholder="کد پستی" pInputText>
            </div>
            <div class="p-md-3">
                <input placeholder="شماره تماس" pInputText>
            </div>
        </div>
    </p-card>
    <br>
    <p-card header="اشخاص حقوقی">
        <div class="p-d-flex p-flex-wrap Fs-mlf4">
            <div class="Fs-p-md2 ">
                <input placeholder="کد شهاب مبدا" pInputText>
            </div>
            <div class="Fs-p-md2 FS-mr3">
                <input STYLE="width: 100%" placeholder="اطلاعات پیوست مشتریان" class="p-inputtext-lg" pInputText>

            </div>
            <div class="Fs-p-md2  FS-mr3">
                <p-dropdown class="p-dropdown-w80" placeholder=" در خواست پرداخت" optionValue="value"
                            [autoDisplayFirst]="false"    optionLabel="label"></p-dropdown>
            </div>
            <div class="FS-mr1 Fs-p-md-11-5 FS-mt1">
                <input class="input-w-80" placeholder="شرح / توضیحات" pInputText/>
            </div>
            <div class="Fs-p-md  FS-mt1">
                <p-persian-calendar placeholder="شروع" yearRange="1300:1410"
                                    class="app-persian-calendar-style"></p-persian-calendar>
            </div>
            <div class="Fs-p-md FS-mr FS-mt1">
                <p-persian-calendar placeholder="اتمام" yearRange="1300:1410"
                                    class="app-persian-calendar-style"></p-persian-calendar>
            </div>
            <div class="Fs-p-md2 FS-mr FS-mt1">
                <p-dropdown placeholder="     فواصل زمانی" optionValue="value"
                            [autoDisplayFirst]="false"   optionLabel="label" [options]="listDrop"></p-dropdown>
            </div>
        </div>
    </p-card>
    <div class="p-col-12">
        <br>
        <button id="btnRegister" class="p-button-info" pButton label="ثبت در خواست"></button>&nbsp;
        <button id="btnCheckNationalCode" class="p-button-info" pButton label="برسی کامل کد ملی"></button>&nbsp;
    </div>
</p-panel>
