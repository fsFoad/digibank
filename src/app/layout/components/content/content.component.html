<!--
    *ngIf="true" hack is required here for router-outlet to work
    correctly. Otherwise, it won't register the changes on the
    layout and won't update the view.
 -->
<div class="page-container ui-rtl" [ngClass]="constants.AppFontClass"
     *ngIf="constants.AppWrapperInitializer" [dir]="constants.APPDirection">
    <router-outlet *ngIf="constants.AppWrapperInitializer"></router-outlet>
</div>
